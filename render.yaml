databases:
  - name: picnova-db
    databaseName: picnova
    user: picnova_user
    plan: free

services:
  - type: web
    name: picnova-app
    plan: free
    runtime: node
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install --no-frozen-lockfile && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/help-invest run build && pnpm --filter @workspace/api-server run build
    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: picnova-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
