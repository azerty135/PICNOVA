openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HELP Investment Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: dashboard
    description: Dashboard and summary data
  - name: investments
    description: Investment plan operations
  - name: transactions
    description: Transaction history
  - name: withdrawals
    description: Withdrawal requests
  - name: admin
    description: Admin operations
  - name: referral
    description: Referral / team operations
  - name: profile
    description: User profile operations
  - name: notifications
    description: User notifications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Phone already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone and PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary data
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /investments:
    get:
      operationId: getInvestments
      tags: [investments]
      summary: List user investments
      responses:
        "200":
          description: List of investments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Investment"
    post:
      operationId: createInvestment
      tags: [investments]
      summary: Create a new investment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestmentInput"
      responses:
        "201":
          description: Investment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
        "400":
          description: Invalid amount or insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /investments/{id}:
    get:
      operationId: getInvestment
      tags: [investments]
      summary: Get a specific investment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Investment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions:
    get:
      operationId: getTransactions
      tags: [transactions]
      summary: Get transaction history
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /withdrawals:
    get:
      operationId: getWithdrawals
      tags: [withdrawals]
      summary: Get withdrawal requests
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile (name, PIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /referral/team:
    get:
      operationId: getReferralTeam
      tags: [referral]
      summary: Get referral team and stats
      responses:
        "200":
          description: Referral team data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralTeam"

  /user/notifications:
    get:
      operationId: getUserNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: User notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserNotification"
    patch:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /deposits:
    post:
      operationId: createDeposit
      tags: [transactions]
      summary: Make a deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "201":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Invalid amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/promote:
    post:
      operationId: promoteUser
      tags: [admin]
      summary: Promote a user to admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User promoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/demote:
    post:
      operationId: demoteUser
      tags: [admin]
      summary: Remove admin rights from a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User demoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/ban:
    post:
      operationId: banUser
      tags: [admin]
      summary: Ban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/unban:
    post:
      operationId: unbanUser
      tags: [admin]
      summary: Unban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/withdrawals:
    get:
      operationId: getAdminWithdrawals
      tags: [admin]
      summary: List all withdrawal requests
      responses:
        "200":
          description: All withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawal"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/withdrawals/{id}/approve:
    post:
      operationId: approveWithdrawal
      tags: [admin]
      summary: Approve a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/withdrawals/{id}/reject:
    post:
      operationId: rejectWithdrawal
      tags: [admin]
      summary: Reject a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/broadcast:
    post:
      operationId: sendBroadcast
      tags: [admin]
      summary: Send a global message to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notifications:
    get:
      operationId: getAdminNotifications
      tags: [admin]
      summary: Get broadcast notifications
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BroadcastNotification"

  /admin/trigger-gains:
    post:
      operationId: triggerGains
      tags: [admin]
      summary: Manually trigger daily gains
      responses:
        "200":
          description: Gains processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    AuthCredentials:
      type: object
      properties:
        phone:
          type: string
        pin:
          type: string
      required:
        - phone
        - pin

    RegisterInput:
      type: object
      properties:
        phone:
          type: string
        pin:
          type: string
        referralCode:
          type: string
      required:
        - phone
        - pin

    UpdateProfileInput:
      type: object
      properties:
        name:
          type: string
        currentPin:
          type: string
        newPin:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: ["string", "null"]
        balance:
          type: number
        totalInvested:
          type: number
        totalGains:
          type: number
        referralCode:
          type: string
        referralBonus:
          type: number
        isAdmin:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - phone
        - balance
        - totalInvested
        - totalGains
        - referralCode
        - referralBonus
        - isAdmin
        - createdAt

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    DashboardSummary:
      type: object
      properties:
        balance:
          type: number
        totalInvested:
          type: number
        totalGains:
          type: number
        activeInvestments:
          type: integer
        pendingWithdrawals:
          type: number
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
      required:
        - balance
        - totalInvested
        - totalGains
        - activeInvestments
        - pendingWithdrawals
        - recentTransactions

    Investment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        dailyReturnRate:
          type: number
        totalReturn:
          type: number
        status:
          type: string
          enum: [active, completed, cancelled]
        startDate:
          type: string
        endDate:
          type: ["string", "null"]
        durationDays:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - userId
        - amount
        - dailyReturnRate
        - totalReturn
        - status
        - startDate
        - durationDays
        - createdAt

    InvestmentInput:
      type: object
      properties:
        amount:
          type: number
      required:
        - amount

    Transaction:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [deposit, withdrawal, gain, investment]
        amount:
          type: number
        description:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
        createdAt:
          type: string
      required:
        - id
        - userId
        - type
        - amount
        - description
        - status
        - createdAt

    Withdrawal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        method:
          type: string
        accountDetails:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
        processedAt:
          type: ["string", "null"]
      required:
        - id
        - userId
        - amount
        - method
        - accountDetails
        - status
        - createdAt

    WithdrawalInput:
      type: object
      properties:
        amount:
          type: number
        method:
          type: string
        accountDetails:
          type: string
      required:
        - amount
        - method
        - accountDetails

    DepositInput:
      type: object
      properties:
        amount:
          type: number
        method:
          type: string
      required:
        - amount
        - method

    ReferralMember:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: ["string", "null"]
        totalInvested:
          type: number
        joinedAt:
          type: string
      required:
        - id
        - phone
        - totalInvested
        - joinedAt

    ReferralTeam:
      type: object
      properties:
        referralCode:
          type: string
        totalMembers:
          type: integer
        totalBonus:
          type: number
        members:
          type: array
          items:
            $ref: "#/components/schemas/ReferralMember"
      required:
        - referralCode
        - totalMembers
        - totalBonus
        - members

    UserNotification:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        type:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - message
        - type
        - isRead
        - createdAt

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalDeposited:
          type: number
        totalWithdrawn:
          type: number
        totalInvested:
          type: number
        pendingWithdrawals:
          type: integer
        activeInvestments:
          type: integer
      required:
        - totalUsers
        - totalDeposited
        - totalWithdrawn
        - totalInvested
        - pendingWithdrawals
        - activeInvestments

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: ["string", "null"]
        balance:
          type: number
        totalInvested:
          type: number
        totalGains:
          type: number
        isAdmin:
          type: boolean
        isBanned:
          type: boolean
        referralCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - phone
        - balance
        - totalInvested
        - totalGains
        - isAdmin
        - isBanned
        - referralCount
        - createdAt

    AdminWithdrawal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userPhone:
          type: string
        amount:
          type: number
        method:
          type: string
        accountDetails:
          type: string
        status:
          type: string
        createdAt:
          type: string
        processedAt:
          type: ["string", "null"]
      required:
        - id
        - userId
        - userPhone
        - amount
        - method
        - accountDetails
        - status
        - createdAt

    BroadcastInput:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    BroadcastNotification:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        sentAt:
          type: string
      required:
        - id
        - message
        - sentAt
